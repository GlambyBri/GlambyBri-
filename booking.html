<!-- HEADER -->
<section class="booking">

  <h2>Book Your Appointment</h2>

  <p>
    Please fill out the form below and I’ll contact you to confirm your appointment.
  </p>

  <form action="https://formspree.io/f/xjgqovyw" method="POST">

    <input type="text" name="name" placeholder="Full Name" required>

    <input type="tel" name="phone" placeholder="Phone Number" required>

    <input type="email" name="email" placeholder="Email Address" required>

    <select name="service" required>
      <option value="">Select a Service</option>
      <option>Silk Press</option>
      <option>Blowout</option>
      <option>Shampoo & Style</option>
      <option>Deep Conditioning</option>
      <option>Ponytail</option>
      <option>Nails</option>
    </select>

    <label>Preferred Date</label>
    <input type="date" name="date">

    <label>Message</label>
    <textarea name="message" rows="5" placeholder="Tell me what you're looking for..."></textarea>

    <button type="submit" class="button">Submit Booking</button>

  </form>

</section>
